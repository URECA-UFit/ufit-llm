name: FastAPI Prod CI/CD

on:
  # 1) PR 생성/수정 : 빌드·테스트만
  pull_request:
    branches: [ "prod" ]

  # 2) prod 브랜치에 머지(push) : 도커 빌드 + 배포
  push:
    branches: [ "prod" ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/ufit_ai          # 공통 이미지명
  EC2_DIR: /home/ubuntu/ufit                                     # compose 경로
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
##################################################################
#  머지(push) 단계 : Build -> Push -> Deploy  --------------------
##################################################################
  build-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Build & Push Docker
      run: |
        TAG=${{ github.sha }}
        docker build -f ufit/Dockerfile -t $DOCKER_IMAGE:$TAG .
        docker tag $DOCKER_IMAGE:$TAG $DOCKER_IMAGE:latest
        docker push --all-tags $DOCKER_IMAGE

    # ---------- Slack 알림 ----------
    - name: Notify Slack – SUCCESS
      if: success()
      run: |
        curl -X POST -H 'Content-Type: application/json' -d "{
          \"text\":\"🧠 *[LLM Repo]* ✅ Docker Hub 푸시 성공\n*이미지:* $DOCKER_IMAGE:latest\"
        }" $SLACK_WEBHOOK

    - name: Notify Slack – FAILURE
      if: failure()
      run: |
        curl -X POST -H 'Content-Type: application/json' -d "{
          \"text\":\"🧠 *[LLM Repo]* ❌ Docker Build/Push 실패\"
        }" $SLACK_WEBHOOK

##################################################################
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-push

    steps:
    - name: Deploy on EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        port: 22
        script: |
          echo "${{ secrets.ENV_FILE_CONTENTS }}" > $EC2_DIR/.env
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_HUB_TOKEN }}
          cd /home/ubuntu/ufit
          docker-compose down --volumes --remove-orphans
          docker image prune -af
          docker-compose pull
          docker-compose up -d

    # ---------- Slack 알림 ----------
    - name: Notify Slack – SUCCESS
      if: success()
      run: |
        curl -X POST -H 'Content-Type: application/json' -d "{
          \"text\":\"🧠 *[LLM Repo]* 🚀 EC2 배포 완료\n*서버:* ${{ secrets.EC2_HOST }}\n*이미지:* $DOCKER_IMAGE:latest\"
        }" $SLACK_WEBHOOK

    - name: Notify Slack – FAILURE
      if: failure()
      run: |
        curl -X POST -H 'Content-Type: application/json' -d "{
          \"text\":\"🧠 *[LLM Repo]* ❌ EC2 배포 실패\"
        }" $SLACK_WEBHOOK
