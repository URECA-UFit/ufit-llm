name: FastAPI Prod CI/CD

on:
  pull_request:
    branches: [ "prod" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Slack 알림 (PR 생성 시)
      if: github.event.action == 'opened' || github.event.action == 'reopened'
      run: |
        curl -X POST -H 'Content-type: application/json' --data "{
          \"text\": \"🧠 *[LLM Repository]* 📣 [배포 PR 생성됨]\n*브랜치:* ${{ github.head_ref }} → prod\n*작성자:* ${{ github.actor }}\n*제목:* ${{ github.event.pull_request.title }}\n*링크:* ${{ github.event.pull_request.html_url }}\"
        }" ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Checkout 코드
      uses: actions/checkout@v4

    - name: Python 셋업
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 의존성 설치 + 테스트
      run: |
        pip install -r requirements.txt
        pip install pytest httpx
        pytest

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout 코드
      uses: actions/checkout@v4

    - name: Docker 로그인
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Docker 이미지 빌드 및 푸시
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ufit_ai:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/ufit_ai:latest

    - name: Slack 알림 (도커 푸시 성공)
      run: |
        curl -X POST -H 'Content-type: application/json' --data "{
          \"text\": \"🧠 *[LLM Repository]* ✅ Docker Hub 푸시 완료\n📦 이미지: ${{ secrets.DOCKER_USERNAME }}/ufit_ai:latest\"
        }" ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
    - name: EC2 서버에 배포
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_KEY }}
        port: 22
        script: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_HUB_TOKEN }}
          docker pull ${{ secrets.DOCKER_USERNAME }}/ufit_ai:latest
          docker stop ufit_ai || true
          docker rm ufit_ai || true
          docker run -d --name ufit_ai -p 8000:8000 ${{ secrets.DOCKER_USERNAME }}/ufit_ai:latest

    - name: Slack 알림 (배포 완료)
      run: |
        curl -X POST -H 'Content-type: application/json' --data "{
          \"text\": \"🧠 *[LLM Repository]* 🚀 EC2 배포 완료\n🔗 서버: ${{ secrets.EC2_HOST }}\n📦 이미지: ${{ secrets.DOCKER_USERNAME }}/ufit_ai:latest\"
        }" ${{ secrets.SLACK_WEBHOOK_URL }}
