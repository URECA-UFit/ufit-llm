name: FastAPI CI

on:
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 코드
      uses: actions/checkout@v4

    - name: Python 3.13 설정
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: pip 업데이트 및 의존성 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 코드 스타일 검사 (flake8)
      run: |
        pip install flake8
        flake8 ufit/main.py ufit/router ufit/services --max-line-length=100

    - name: 테스트 실행 (pytest)
      run: |
        pip install pytest httpx
        pytest
